<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pointcut — Vue + Vite tracer bullet</title>
    <!--
      The stand-in third-party UI kit, linked by URL straight from node_modules.
      A <link> (not a JS CSS import) keeps a real stylesheet `href` under
      node_modules in dev, which is exactly the signal Pointcut's provenance
      walker uses to flag the rule as vendor-owned — no design-system names
      involved (issue #6). A JS `import '...styles.css'` would inline a <style>
      tag with a null href in dev and defeat the demonstration. The `?direct`
      query tells Vite to serve raw text/css (not its JS CSS module wrapper) so
      the <link> applies; the href still contains `node_modules`.
    -->
    <link rel="stylesheet" href="/node_modules/@demo/fake-ui-kit/styles.css?direct" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
